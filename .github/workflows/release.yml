name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build macOS binaries
        run: |
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o gogcli-mcp-darwin-arm64 ./cmd/gogcli-mcp
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o gogcli-mcp-darwin-amd64 ./cmd/gogcli-mcp

      - name: Generate checksums
        run: shasum -a 256 gogcli-mcp-darwin-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gogcli-mcp-darwin-arm64
            gogcli-mcp-darwin-amd64
            checksums.txt
